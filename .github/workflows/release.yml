name: release
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install && npm run build && npm run test && npm run typecheck
      - run: |
          cd services/agentd-py
          python -m venv .venv && . .venv/bin/activate
          pip install -e .[dev]
          pytest
      - run: cd services/indexer-rs && cargo test

  indexer:
    needs: test
    strategy:
      matrix:
        include:
          # GitHub retired the free Intel macOS runner (macos-13); darwin-x64
          # is cross-compiled from the arm64 macos-latest host instead of a
          # native x64 runner.
          - { os: macos-latest, platform: darwin-arm64, target: "" }
          - { os: macos-latest, platform: darwin-x64, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, platform: linux-x64, target: "" }
          - { os: windows-latest, platform: win32-x64, target: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}
      - if: matrix.target == ''
        run: cd services/indexer-rs && cargo build --release
      - if: matrix.target != ''
        run: cd services/indexer-rs && cargo build --release --target ${{ matrix.target }}
      - name: stage binary (posix, native)
        if: runner.os != 'Windows' && matrix.target == ''
        run: |
          mkdir -p dist
          cp services/indexer-rs/target/release/crucible-indexer \
             dist/crucible-indexer-${{ matrix.platform }}
      - name: stage binary (posix, cross-compiled)
        if: runner.os != 'Windows' && matrix.target != ''
        run: |
          mkdir -p dist
          cp services/indexer-rs/target/${{ matrix.target }}/release/crucible-indexer \
             dist/crucible-indexer-${{ matrix.platform }}
      - name: stage binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy services\indexer-rs\target\release\crucible-indexer.exe dist\crucible-indexer-${{ matrix.platform }}.exe
      - uses: actions/upload-artifact@v4
        with: { name: "indexer-${{ matrix.platform }}", path: dist/ }

  fetch-tools:
    # uv + ripgrep + rust-analyzer: download official release binaries per
    # platform, restage under our naming convention. Pinned versions live in
    # this job's env.
    needs: test
    runs-on: ubuntu-latest
    env:
      UV_VERSION: "0.5.24"
      RG_VERSION: "14.1.1"
      RUST_ANALYZER_VERSION: "2026-07-06"
      GOPLS_VERSION: "v0.22.0"
      # jdtls (Java LSP) requires Java 21+ — its own launcher enforces this
      # (verified against a real installed jdtls) — so the bundled JRE is
      # pinned to feature version 21, not whatever LTS happens to be newest.
      JRE_FEATURE_VERSION: "21"
      JRE_VERSION_TAG: "jdk-21.0.11+10"
      JRE_VERSION_US: "21.0.11_10"
      JDTLS_VERSION: "1.61.0-202607070104"
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/release/fetch_tools.py --uv "$UV_VERSION" --rg "$RG_VERSION" --rust-analyzer "$RUST_ANALYZER_VERSION" --out dist/
      # gopls has no prebuilt per-platform release binary to download (unlike
      # uv/ripgrep/rust-analyzer) — the Go team only ships source, via `go
      # install`. build_gopls.py cross-compiles it for all 4 platforms from
      # this single ubuntu runner (verified locally — Go's GOOS/GOARCH
      # cross-compilation needs no target-OS runner, unlike the Rust indexer
      # matrix below), staging into the same dist/ dir under the same
      # gopls-<platform>[.exe] convention make_manifest.py already expects.
      - uses: actions/setup-go@v5
        with: { go-version: "1.24" }
      - run: python3 scripts/release/build_gopls.py --version "$GOPLS_VERSION" --out dist/
      # jre + jdtls are directory-tree archives (not single binaries) —
      # re-hosted as-is, unextracted; installer.ts extracts them client-side.
      - run: python3 scripts/release/fetch_jre.py --feature-version "$JRE_FEATURE_VERSION" --version-tag "$JRE_VERSION_TAG" --version-us "$JRE_VERSION_US" --out dist/
      - run: python3 scripts/release/fetch_jdtls.py --version "$JDTLS_VERSION" --out dist/
      - uses: actions/upload-artifact@v4
        with: { name: tools, path: dist/ }

  package:
    needs: [indexer, fetch-tools]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { path: dist-artifacts, merge-multiple: true }
      - run: |
          cd services/agentd-py
          pip install build && python -m build --wheel --outdir ../../dist-artifacts
      - run: |
          python scripts/release/make_manifest.py \
            --release-tag "${GITHUB_REF_NAME}" --dist dist-artifacts \
            --url-base "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --component-version indexer=${GITHUB_REF_NAME#v} \
            --component-version ripgrep=14.1.1 --component-version uv=0.5.24 \
            --component-version rust-analyzer=2026-07-06 \
            --component-version gopls=v0.22.0 \
            --component-version jre=21.0.11+10 \
            --component-version jdtls=1.61.0-202607070104 \
            --lsp-packages "pyright@1.1.400,typescript-language-server@4.3.3" \
            --out dist-artifacts/manifest.json
      - run: |
          npm install && npm run build
          cp dist-artifacts/manifest.json apps/vscode-extension/resources/runtime-manifest.json
          # --no-dependencies: extension.ts is esbuild-bundled into one self-contained
          # dist/extension.js (see apps/vscode-extension/esbuild.js), so no node_modules
          # bundling is needed. Without this flag, vsce's default dependency-bundling
          # walks the whole npm-workspaces monorepo root and crashes on any file it
          # finds there (e.g. tsconfig.base.json) — confirmed live on a clean checkout.
          cd apps/vscode-extension && npx vsce package --no-dependencies --out ../../dist-artifacts/
      - name: attach to release
        uses: softprops/action-gh-release@v2
        with: { files: dist-artifacts/* }

  publish:
    # Marketplace publish is opt-in: skipped entirely (not failed) when VSCE_PAT
    # isn't configured, so GitHub-Releases-only distribution (see install.sh)
    # works with zero Marketplace account/PAT setup. The `secrets` context is
    # never allowed inside an `if:` expression (job- or step-level) — only in
    # env/with/run — so the secret is lifted into a job-level env var first and
    # the step gates on `env.VSCE_PAT` instead.
    needs: package
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist-artifacts, merge-multiple: true }
      - if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --packagePath dist-artifacts/*.vsix -p "$VSCE_PAT"
